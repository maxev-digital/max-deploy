name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest
        run: |
          cd /var/www/max-deploy
          git fetch origin master
          git reset --hard origin/master

      - name: Install dependencies
        run: |
          cd /var/www/max-deploy
          npm ci --omit=dev --legacy-peer-deps

      - name: Build
        run: |
          cd /var/www/max-deploy
          npm run build

      - name: Restart app
        run: pm2 restart max-deploy

      - name: Done
        run: echo "Deploy complete at $(date)"
